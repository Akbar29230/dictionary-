<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Dictionary Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .dictionary-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result-box {
            min-height: 100px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .word-title {
            font-size: 22px;
            font-weight: bold;
            margin: 0 0 5px 0;
            text-transform: capitalize;
        }

        .phonetic {
            color: var(--accent);
            font-style: italic;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .definition-item {
            background-color: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }

        .part-of-speech {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: bold;
            margin-bottom: 4px;
        }

        .meaning {
            font-size: 15px;
            line-height: 1.4;
        }

        .error-msg {
            color: #ef4444;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="dictionary-container">
    <h1>Web Dictionary</h1>
    <div class="search-box">
        <input type="text" id="wordInput" placeholder="Enter an English word..." onkeypress="handleKeyPress(event)">
        <button onclick="searchWord()">Search</button>
    </div>
    <div id="result" class="result-box" style="display: none;"></div>
</div>

<script>
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            searchWord();
        }
    }

    async function searchWord() {
        const input = document.getElementById("wordInput").value.trim().toLowerCase();
        const resultDiv = document.getElementById("result");
        
        if (!input) return;

        resultDiv.style.display = "block";
        resultDiv.innerHTML = "<p style='color: var(--text-muted); text-align: center;'>Searching...</p>";

        try {
            const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${input}`);
            if (!response.ok) throw new Error("Word not found");
            
            const data = await response.json();
            const wordData = data[0];

            let html = `
                <div class="word-title">${wordData.word}</div>
                <div class="phonetic">${wordData.phonetic || ''}</div>
            `;

            wordData.meanings.slice(0, 3).forEach(meaning => {
                const definition = meaning.definitions[0].definition;
                html += `
                    <div class="definition-item">
                        <div class="part-of-speech">${meaning.partOfSpeech}</div>
                        <div class="meaning">${definition}</div>
                    </div>
                `;
            });

            resultDiv.innerHTML = html;

        } catch (error) {
            resultDiv.innerHTML = `<div class="error-msg">Sorry, word not found. Try another one!</div>`;
        }
    }
</script>

</body>
</html>
